server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro generates /about/index.html, /products/neon-harness/index.html, etc.
  # Map /about → /about/index.html and let real files pass through unchanged.
  location / {
    try_files $uri $uri/index.html =404;
  }

  # Contact form -> sidecar mailer container (same compose network).
  # Same-origin from the browser, so no CORS dance.
  location = /api/contact {
    proxy_pass http://mailer:8086/contact;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 15s;
    client_max_body_size 32k;
  }

  # Long-term cache for hashed assets.
  location ~* ^/_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Sensible cache for the placeholder SVGs + favicons.
  location ~* \.(jpg|jpeg|png|svg|woff2?|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public";
  }

  # Make feeds discoverable + correct content-type (feed.xml is fine via default).
  location = /feed.json {
    default_type application/feed+json;
  }

  # Gzip text payloads.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/rss+xml application/feed+json image/svg+xml;
  gzip_min_length 1024;
}
