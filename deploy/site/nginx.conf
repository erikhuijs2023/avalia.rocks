server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro generates /about/index.html, /products/neon-harness/index.html, etc.
  # Map /about → /about/index.html and let real files pass through unchanged.
  # no-cache = "store, but revalidate before reuse": the ETag turns that into
  # a cheap 304 when nothing changed, and a fresh page right after a rebuild.
  # Without this, browsers heuristically cache HTML based on Last-Modified
  # and serve stale pages for hours/days.
  location / {
    try_files $uri $uri/index.html =404;
    add_header Cache-Control "no-cache";
  }

  # Contact form -> sidecar mailer container (same compose network).
  # Same-origin from the browser, so no CORS dance.
  # The variable + resolver force nginx to re-resolve "mailer" per request
  # (Docker's embedded DNS, 127.0.0.11). With a literal proxy_pass nginx
  # caches the container IP at startup and serves 502s after the mailer
  # is recreated with a new IP.
  location = /api/contact {
    resolver 127.0.0.11 valid=10s;
    set $mailer_upstream mailer;
    proxy_pass http://$mailer_upstream:8086/contact;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 15s;
    client_max_body_size 32k;
  }

  # Long-term cache for hashed assets.
  location ~* ^/_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Images, fonts, favicons: 1 day. Directus keeps the same file UUID when
  # you replace a file's contents, so /img/cms/<uuid>.jpg can silently get
  # new bytes — a short TTL keeps that staleness window small. After expiry
  # the ETag still gives a 304 when unchanged.
  location ~* \.(jpg|jpeg|png|svg|woff2?|webp|ico)$ {
    expires 1d;
    add_header Cache-Control "public";
  }

  # Make feeds discoverable + correct content-type (feed.xml is fine via default).
  # Exact-match location wins over `location /`, so repeat no-cache here.
  location = /feed.json {
    default_type application/feed+json;
    add_header Cache-Control "no-cache";
  }

  # Gzip text payloads.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/rss+xml application/feed+json image/svg+xml;
  gzip_min_length 1024;
}
