## hugosdesign.com + www.hugosdesign.com -> mini-pc (192.168.178.29:8083) [Drupal 7 multisite]
## Lives at /mnt/user/appdata/swag/nginx/proxy-confs/ on the Unraid SWAG.
## Mirror of the live conf, kept in the repo for version control.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name hugosdesign.com www.hugosdesign.com;

    include /config/nginx/ssl.conf;

    client_max_body_size 64M;

    # Old Drupal contact form (node 2596) -> the new support form, with the
    # HDM brand pre-selected. Exact match so it takes precedence over the
    # proxy below; everything else still serves the old site.
    location = /node/2596 {
        return 301 https://avalia.rocks/contact?brand=HDM;
    }

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 192.168.178.29;
        set $upstream_port 8083;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
