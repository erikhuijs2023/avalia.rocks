## SWAG proxy-conf for cms.avalia.rocks → Directus on the mini-pc.
## Drop into /mnt/user/appdata/swag/nginx/proxy-confs/ on Unraid,
## then `docker restart swag` (or it loads on next container start).
## NB: TLS coverage requires cms.avalia.rocks in the SWAG EXTRA_DOMAINS.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name cms.*;

    include /config/nginx/ssl.conf;

    # Directus enforces its own upload limits; let large admin uploads through.
    client_max_body_size 0;

    # Directus runs on the mini-pc (different host than SWAG), so we proxy
    # over the LAN IP directly rather than docker DNS.
    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 192.168.178.29;
        set $upstream_port 8085;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
